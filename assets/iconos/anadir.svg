<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">

  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2F78A6" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#2F78A6" stop-opacity="0" />
    </radialGradient>

    <linearGradient id="innerRing" x1="30%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#2F78A6" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#0E2A38" stop-opacity="0.45" />
    </linearGradient>

    <linearGradient id="outerRing" x1="30%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#2F78A6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0E2A38" stop-opacity="0.35" />
    </linearGradient>

    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE9BF" />
      <stop offset="55%" stop-color="#D6A84B" />
      <stop offset="100%" stop-color="#8A6A2A" />
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#9fd6f5" stop-opacity="0.55" />
      <stop offset="100%" stop-color="#9fd6f5" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="specTop" cx="48%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.32" />
    </filter>
  </defs>

  
  <circle cx="128" cy="128" r="100" fill="url(#halo)" />
  <circle cx="128" cy="128" r="82" fill="none" stroke="url(#innerRing)" stroke-width="14" />
  <circle cx="128" cy="128" r="119" fill="none" stroke="url(#outerRing)" stroke-width="8" />

  
  <circle cx="128" cy="128" r="72" fill="url(#glow)" />

  
  <g filter="url(#softShadow)" id="simbolo">
    <g transform="translate(68.0,68.0) scale(5.0)">
      <path d="M12 5 V19" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M5 12 H19" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </g>
  </g>

  
  <circle cx="128" cy="92" r="56" fill="url(#specTop)" opacity="0.9" />
