<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0c0f14">

    <title>Crear cuenta · LigronAir</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/register.css">

</head>

<body>

<div class="page">

    <header class="ligron-header">

        <div class="header-brand">

            <a href="index.html">

                <img
                    class="header-logo"
                    src="ligron.png"
                    alt="LigronAir">

            </a>

            <div class="header-text">

                <h1 class="header-title">
                    LigronAir
                </h1>

                <div class="header-subtitle">
                    Plataforma Distribuida de Producción Audiovisual
                </div>

            </div>

        </div>

        <div class="header-actions" id="headerActions"></div>

    </header>

    <main class="register-page">

        <section class="register-card">

            <img
                class="register-logo"
                src="ligron.png"
                alt="LigronAir">

            <h2>
                Crear una cuenta
            </h2>

            <p class="register-description">
                Únete al ecosistema LigronAir para administrar
                equipos, servicios y futuras funcionalidades
                distribuidas de la plataforma.
            </p>

            <form id="registerForm">

                <div class="form-group">

                    <label for="nombre">
                        Nombre
                    </label>

                    <input
                        id="nombre"
                        type="text"
                        placeholder="Tu nombre">

                </div>

                <div class="form-group">

                    <label for="email">
                        Correo electrónico
                    </label>

                    <input
                        id="email"
                        type="email"
                        placeholder="nombre@correo.com">

                </div>

                <div class="form-group">

                    <label for="password">
                        Contraseña
                    </label>

                    <input
                        id="password"
                        type="password">

                </div>

                <div class="form-group">

                    <label for="password2">
                        Repetir contraseña
                    </label>

                    <input
                        id="password2"
                        type="password">

                </div>

                <button
                    class="ligron-button primary register-button"
                    type="submit">

                    Crear cuenta

                </button>

            </form>

            <!-- Mensajes del registro -->

            <div
                id="registerMessage"
                class="register-message hidden">

            </div>

            <div class="register-footer">

                ¿Ya tienes una cuenta?

                <a href="login.html">
                    Iniciar sesión
                </a>

            </div>

        </section>

    </main>

</div>

<script type="module" src="js/header.js"></script>
<script src="js/register.js"></script>

</body>

</html>
